clusters:
  - name: "sample-cluster"
    connectTimeout: "5s"
    type: "EDS"
    lbPolicy: "ROUND_ROBIN"
    circuitBreakers:
      maxConnections: 10000
      maxPendingRequests: 1000
      maxRequests: 5000
      maxRetries: 3
    outlierDetection:
      consecutive5xx: 5
      consecutiveGatewayFailure: 3
      consecutiveLocalOriginFailure: 2
      interval: "10s"
      baseEjectionTime: "30s"
      maxEjectionTime: "300s"
      maxEjectionPercent: 10
    rateLimiting:
      maxTokens: 1000
      tokensPerFill: 100
      fillInterval: "1s"

endpoints:
  - clusterName: "sample-cluster"
    endpoints:
      - address: "127.0.0.1"
        port: 56061
        weight: 1
      - address: "127.0.0.1"
        port: 56062
        weight: 1
      - address: "127.0.0.1"
        port: 56063
        weight: 1

listeners:
  - name: "sample"
    address: "0.0.0.0"
    port: 10000
    filterChains:
      - filters:
          - name: "envoy.filters.network.http_connection_manager"
            routeConfigName: "sample-route"

routes:
  - name: "sample-route"
    virtualHosts:
      - name: "sample"
        domains: ["*"]
        routes:
          - match:
              path:
                prefix: "/"
            route:
              cluster: "sample-cluster"
