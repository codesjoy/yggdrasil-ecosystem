yggdrasil:
  mode: dev

  server:
    transports:
      - grpc

  transports:
    grpc:
      server:
        address: "127.0.0.1:56131"
        attr:
          example: multi-instance
          instance_id: a

  admin:
    application:
      namespace: default
      version: "1.0.0"
      metadata:
        example: multi-instance
        instance_id: a

  polaris:
    sdks:
      default:
        addresses:
          - "127.0.0.1:8091"
        config_addresses:
          - "127.0.0.1:8093"
        token: ""

  discovery:
    registry:
      type: polaris
      config:
        sdk: default
        namespace: default
        service_token: ""
        ttl: 5s
        auto_heartbeat: true
        timeout: 2s
        retry_count: 0

app:
  multi_instance:
    greeting: "hello from instance A"
    instance_id: a
