syntax = "proto3";

package codesjoy.yggdrasil.ecosystem.protovalidate.examples.user.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/codesjoy/yggdrasil-ecosystem/modules/protovalidate/v3/examples/protogen/user/v1;user_v1";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc ImportUsers(stream CreateUserRequest) returns (ImportUsersResponse) {}
}

message CreateUserRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 2
    max_len: 40
  }];
  int32 age = 3 [(buf.validate.field).int32 = {
    gte: 13
    lte: 130
  }];
}

message CreateUserResponse {
  string id = 1;
  string email = 2;
  string display_name = 3;
}

message ImportUsersResponse {
  int32 imported = 1;
}
