services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: yggdrasil-otlp-collector
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ../logs:/var/log/otlp-examples:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: yggdrasil-otlp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: yggdrasil-otlp-loki
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: yggdrasil-otlp-tempo
    command:
      - -config.file=/etc/tempo/config.yaml
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
    ports:
      - "3200:3200"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: yggdrasil-otlp-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped
