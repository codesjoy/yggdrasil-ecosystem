# Yggdrasil OTLP HTTP example.

yggdrasil:
  observability:
    logging:
      handlers:
        default:
          type: console
          config:
            level: info
            format: text

    telemetry:
      tracer: otlp-http
      meter: otlp-http
      providers:
        otlp:
          trace:
            protocol: http
            endpoint: localhost:4318
            tls:
              insecure: true
            timeout: 30s
            batch:
              batchTimeout: 2s
              maxQueueSize: 2048
              maxExportBatchSize: 512
            resource:
              deployment.environment: local
              service.version: 1.0.0
              example.protocol: http
          metric:
            protocol: http
            endpoint: localhost:4318
            tls:
              insecure: true
            timeout: 30s
            exportInterval: 5s
            exportTimeout: 10s
            resource:
              deployment.environment: local
              service.version: 1.0.0
              example.protocol: http
